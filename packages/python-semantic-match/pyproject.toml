[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mightydatainc-semantic-match"
version = "1.2.0"
description = "AI-powered semantic matching and comparison of named item lists"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "mightydatainc-llm-conversation>=1.0.5"
]
authors = [{ name = "Mikhail Voloshin" }]
license = { file = "LICENSE" }

[tool.hatch.build.targets.wheel]
packages = ["src/mightydatainc_semantic_match"]

[tool.pytest.ini_options]
pythonpath = ["src"]
