[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mightydatainc-semantic-match"
version = "1.0.0"
description = "An easy-to-call function that invokes iterative, AI-guided edits to a JSON-compatible object"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "python-dotenv>=1.0.1",
  "openai>=2.24.0",
  "mightydatainc-gpt-conversation>=1.3.2"
]
authors = [{ name = "Mikhail Voloshin" }]
license = { file = "LICENSE" }

[tool.hatch.build.targets.wheel]
packages = ["src/mightydatainc_json_surgery"]

[tool.pytest.ini_options]
pythonpath = ["src"]
